<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Login - ZAINU HOST</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #05060a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .card {
            background: rgba(12, 17, 29, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .logo {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .tagline {
            text-align: center;
            color: #a0aec0;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        .form-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #00d4ff;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .checkbox-group input {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 136, 255, 0.4);
        }
        
        .message {
            padding: 12px;
            margin-top: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .success { background: rgba(76, 175, 80, 0.15); border: 1px solid #00ff88; color: #00ff88; }
        .error { background: rgba(244, 67, 54, 0.15); border: 1px solid #ff5555; color: #ff5555; }
        
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="logo">ZAINU HOST</div>
            <div class="tagline">Professional Hosting Control Panel</div>
            
            <h2 class="form-title">LOGIN</h2>
            
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label>Remember Me</label>
            </div>
            
            <button class="btn-login" onclick="login()">
                <span id="loginText">🚀 LOGIN</span>
                <div class="loading" id="loginLoading"></div>
            </button>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            const btn = document.getElementById('loginText');
            const loading = document.getElementById('loginLoading');
            
            btn.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me: rememberMe })
                });
                const data = await res.json();
                
                if (data.success) {
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    btn.style.display = 'inline';
                    loading.style.display = 'none';
                }
            } catch (error) {
                showMessage('⚠️ Server error', 'error');
                btn.style.display = 'inline';
                loading.style.display = 'none';
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);
        }
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
