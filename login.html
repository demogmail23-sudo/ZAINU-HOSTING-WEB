<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Login - ZAINU HOST</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
    
    :root {
      --primary: #00d4ff;
      --primary-dark: #0099cc;
      --primary-light: #00ffff;
      --gradient: linear-gradient(135deg, #00d4ff, #0066ff, #00d4ff);
      --google-gradient: linear-gradient(135deg, #4285f4, #34a853, #fbbc04, #ea4335);
      --bg-dark: #05060a;
      --bg-card: rgba(5, 10, 20, 0.95);
      --text: #ffffff;
      --text-muted: #a0aec0;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Animated Background - Mobile Optimized */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .fast-line, .gold-line {
      position: absolute;
      height: 2px;
      opacity: 0.4;
      animation: lineMove 8s linear infinite;
    }
    
    .fast-line { background: linear-gradient(90deg, transparent, var(--primary), transparent); }
    .gold-line { background: linear-gradient(90deg, transparent, #FFD700, transparent); height: 3px; }
    
    @keyframes lineMove {
      0% { transform: translateX(-100vw) rotate(0deg); }
      100% { transform: translateX(100vw) rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      animation: slideIn 0.8s ease-out;
    }
    
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 30px 25px;
      width: 100%;
      max-width: 450px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient);
      border-radius: 24px 24px 0 0;
    }
    
    .logo {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    
    .tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    
    .form-title {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 25px;
      color: var(--text);
      font-weight: 700;
      position: relative;
    }
    
    .form-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: var(--gradient);
      border-radius: 2px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Tajawal', sans-serif;
      transition: all 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }
    
    /* Google Button */
    .google-btn {
      width: 100%;
      padding: 14px;
      background: white;
      border: none;
      border-radius: 12px;
      color: #333;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      font-family: 'Tajawal', sans-serif;
    }
    
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(66, 133, 244, 0.4);
    }
    
    .google-icon {
      width: 22px;
      height: 22px;
    }
    
    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 20px 0;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      cursor: pointer;
    }
    
    .checkbox-group input {
      display: none;
    }
    
    .checkbox-custom {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 212, 255, 0.5);
      border-radius: 5px;
      margin-right: 10px;
      position: relative;
      background: rgba(0, 0, 0, 0.4);
    }
    
    .checkbox-group input:checked + .checkbox-custom {
      background: var(--primary);
    }
    
    .checkbox-group input:checked + .checkbox-custom::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: black;
      font-size: 12px;
      font-weight: bold;
    }
    
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--gradient);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Tajawal', sans-serif;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 136, 255, 0.5);
    }
    
    .message {
      padding: 12px;
      margin-top: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 0.9rem;
      display: none;
    }
    
    .success { background: rgba(76, 175, 80, 0.15); border: 1px solid #4CAF50; color: #4CAF50; }
    .error { background: rgba(244, 67, 54, 0.15); border: 1px solid #f44336; color: #f44336; }
    
    .loading {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 480px) {
      .card { padding: 25px 18px; }
      .logo { font-size: 2rem; }
      .form-title { font-size: 1.3rem; }
      .btn-login, .google-btn { padding: 12px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="background-animation" id="backgroundAnimation"></div>
  
  <div class="login-container">
    <div class="card">
      <div class="logo">ZAINU HOST</div>
      <div class="tagline">Professional Hosting Control Panel</div>
      
      <h2 class="form-title">LOGIN</h2>
      
      <!-- Google Signup Button -->
      <button class="google-btn" onclick="googleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      
      <div class="divider">OR</div>
      
      <div class="form-group">
        <label>👤 Username</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>
      
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="rememberMe">
        <span class="checkbox-custom"></span>
        <label class="checkbox-label">Remember Me</label>
      </div>
      
      <button class="btn-login" onclick="login()">
        <span id="loginText">🚀 LOGIN</span>
        <div class="loading" id="loginLoading"></div>
      </button>
      
      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    function createBackground() {
      const container = document.getElementById('backgroundAnimation');
      container.innerHTML = '';
      for (let i = 0; i < 8; i++) {
        const line = document.createElement('div');
        line.className = Math.random() > 0.5 ? 'fast-line' : 'gold-line';
        line.style.top = `${Math.random() * 100}%`;
        line.style.left = `${Math.random() * 100}%`;
        line.style.width = `${200 + Math.random() * 400}px`;
        line.style.animationDelay = `${Math.random() * 3}s`;
        line.style.animationDuration = `${6 + Math.random() * 6}s`;
        container.appendChild(line);
      }
    }
    
    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 4000);
    }
    
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const rememberMe = document.getElementById('rememberMe').checked;
      
      if (!username || !password) {
        showMessage('Please fill all fields', 'error');
        return;
      }
      
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('loginText');
      const loading = document.getElementById('loginLoading');
      
      text.style.display = 'none';
      loading.style.display = 'block';
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, remember_me: rememberMe })
        });
        const data = await res.json();
        
        if (data.success) {
          showMessage('✅ Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          showMessage('❌ ' + data.message, 'error');
          text.style.display = 'inline';
          loading.style.display = 'none';
        }
      } catch (error) {
        showMessage('⚠️ Server error', 'error');
        text.style.display = 'inline';
        loading.style.display = 'none';
      }
    }
    
    function googleLogin() {
      window.location.href = '/login/google';
    }
    
    document.getElementById('username')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('password')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    
    createBackground();
    setInterval(createBackground, 30000);
  </script>
</body>
</html>
